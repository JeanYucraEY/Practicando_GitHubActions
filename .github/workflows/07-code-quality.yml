name: Code Quality & Linting

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  code-quality:
    name: Check Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint black flake8 mypy
      
      - name: Run Black (formatter check)
        run: |
          echo "🎨 Verificando formato con Black..."
          black --check src/ tests/ || true
          echo "Nota: ejecuta 'black .' localmente para arreglarlo"
      
      - name: Run Flake8 (linter)
        run: |
          echo "🔍 Ejecutando Flake8..."
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
      
      - name: Run Pylint
        run: |
          echo "📋 Ejecutando Pylint..."
          pylint src/ --fail-under=7.0 --exit-zero || true
      
      - name: Run MyPy (type checking)
        run: |
          echo "🔬 Verificando tipos con MyPy..."
          mypy src/ --ignore-missing-imports || true
      
      - name: Generate code quality report
        run: |
          echo "📊 Resumen de Calidad del Código:"
          echo "================================"
          echo "✅ Análisis completados"
